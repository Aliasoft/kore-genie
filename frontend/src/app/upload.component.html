<div class="upload-zone"
     [class.dragging]="dragging"
     [class.uploading]="state === 'uploading'"
     (dragover)="onDragOver($event)"
     (dragleave)="onDragLeave()"
     (drop)="onDrop($event)"
     (click)="fileInput.click()">

  <input #fileInput type="file"
         accept=".pdf,.docx,.doc,.md,.txt"
         (change)="onFileSelected($event)"
         hidden>

  <ng-container [ngSwitch]="state">

    <span *ngSwitchCase="'idle'">
      ＋ Déposer un document <span class="hint">PDF, Word, Markdown</span>
    </span>

    <span *ngSwitchCase="'uploading'" class="status uploading">
      ⟳ {{ message }}
    </span>

    <span *ngSwitchCase="'success'" class="status success">
      ✓ {{ message }}
    </span>

    <span *ngSwitchCase="'error'" class="status error">
      ✕ {{ message }}
    </span>

  </ng-container>

</div>
